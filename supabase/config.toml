project_id = "dbomfjqijyrkidptrrfi"

# Stripe POSTs to this endpoint with no Supabase JWT — verify by signature instead.
[functions.stripe-webhook]
verify_jwt = false

# intelligence-feed: daily pg_cron pull of RSS news + layoffs.fyi data
# (Phase 12 §A1 added the cron schedule). Authenticated by
# x-intelligence-feed-secret header (INTELLIGENCE_FEED_SECRET env var),
# not user JWT.
[functions.intelligence-feed]
verify_jwt = false

# create-checkout: called from index.html anonymously (buyer hasn't signed in yet).
[functions.create-checkout]
verify_jwt = false

# refresh-jobs: daily pg_cron pull of USAJobs.gov roles. Authenticated by
# x-refresh-secret header (REFRESH_SECRET env var), not user JWT.
[functions.refresh-jobs]
verify_jwt = false

# prune-inactive-data: weekly pg_cron retention purge of stale resumes and
# match_scores. Authenticated by x-prune-secret header (PRUNE_SECRET env var),
# not user JWT.
[functions.prune-inactive-data]
verify_jwt = false

# submit-feedback: anon-callable from the floating feedback widget injected
# into every page. Phase 12 §B2 — gated only by basic input validation, a
# honeypot, and Claude-driven triage. No user JWT required.
[functions.submit-feedback]
verify_jwt = false
