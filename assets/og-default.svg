<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Workforce for Humans — Find Work. Level Up. Move Forward.">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1829"/>
      <stop offset="55%" stop-color="#1a2340"/>
      <stop offset="100%" stop-color="#0f1829"/>
    </linearGradient>
    <radialGradient id="glow" cx="70%" cy="30%" r="55%">
      <stop offset="0%" stop-color="#f5a623" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#f5a623" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Amber accent line -->
  <rect x="88" y="148" width="48" height="4" fill="#f5a623" rx="2"/>

  <!-- Wordmark -->
  <text x="88" y="252" font-family="Georgia, 'Playfair Display', serif" font-size="92" font-weight="900" fill="#ffffff" letter-spacing="-2">Workforce<tspan fill="#f5a623" font-style="italic">for</tspan>Humans</text>

  <!-- Tagline -->
  <text x="88" y="346" font-family="'DM Sans', Helvetica, Arial, sans-serif" font-size="40" font-weight="400" fill="#ffffff" opacity="0.82">Find Work. Level Up. Move Forward.</text>

  <!-- Supporting line -->
  <text x="88" y="420" font-family="'DM Sans', Helvetica, Arial, sans-serif" font-size="26" font-weight="300" fill="#ffffff" opacity="0.55">The platform for displaced workers and career changers.</text>

  <!-- Domain pill -->
  <rect x="88" y="478" width="320" height="52" rx="26" fill="none" stroke="#f5a623" stroke-width="2" opacity="0.55"/>
  <text x="248" y="512" text-anchor="middle" font-family="'DM Mono', monospace" font-size="22" font-weight="500" fill="#f5a623" letter-spacing="1">workforceforhumans.com</text>
</svg>
