<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Payment Cancelled — Workforce for Humans</title>
<meta name="robots" content="noindex, nofollow"/>
<link rel="stylesheet" href="/assets/site.css"/>
<style>
body{min-height:100vh;display:flex;flex-direction:column;}
.main{flex:1;display:flex;align-items:center;justify-content:center;padding:4rem 5vw;text-align:center;}
.card{background:#fff;border:1px solid var(--stone);border-radius:24px;padding:3rem 3.5rem;max-width:540px;width:100%;}
.icon{font-size:3.5rem;margin-bottom:1.5rem;}
.card h1{font-family:var(--font-d);font-size:1.8rem;color:var(--navy);margin-bottom:0.75rem;line-height:1.2;}
.card p{color:var(--slate);font-weight:300;line-height:1.75;margin-bottom:2rem;font-size:0.95rem;}
.btn{display:inline-block;background:var(--amber);color:var(--navy);border:none;border-radius:8px;padding:0.75rem 1.5rem;font-family:var(--font-b);font-size:0.95rem;font-weight:700;text-decoration:none;transition:all 0.2s;margin:0 0.5rem;}.btn:hover{background:var(--amber-dk);transform:translateY(-1px);}
.btn-outline{background:none;border:1px solid var(--stone);color:var(--navy);font-weight:500;}.btn-outline:hover{border-color:var(--amber);color:var(--amber);background:none;}
</style>
</head>
<body data-nav="marketing">
<div id="site-nav"></div>
<script src="/assets/site.js"></script>
<noscript><nav><div class="nav-inner"><a href="index.html" class="nav-logo">Workforce<span class="dot">for</span>Humans</a></div></nav></noscript>

<div class="main">
  <div class="card">
    <div class="icon">&#8592;</div>
    <h1>No worries — nothing was charged.</h1>
    <p>Your checkout was cancelled and no payment was processed. You can try again anytime, or reach out if you have questions about our plans.</p>
    <a href="index.html#employers" class="btn">Try Again</a>
    <a href="mailto:employers@workforceforhumans.com" class="btn btn-outline">Contact Us</a>
  </div>
</div>

<div id="site-footer"></div>
</body>
</html>
