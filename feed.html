<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Intelligence Feed — Workforce for Humans</title>
<meta name="description" content="Real-time layoff alerts, workforce agencies, free training resources, and career intelligence — all in one place."/>
<link rel="stylesheet" href="/assets/site.css"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* HERO */
.feed-hero{background:var(--navy);padding:3rem 5vw 2.5rem;position:relative;overflow:hidden;text-align:center}
.feed-hero::before{content:'';position:absolute;left:50%;top:-200px;width:600px;height:600px;border-radius:50%;background:rgba(200,95,62,.04);transform:translateX(-50%);pointer-events:none}
.feed-hero h1{font-family:var(--font-d);font-size:clamp(1.6rem,3.5vw,2.4rem);color:#fff;margin-bottom:.5rem;line-height:1.15}
.feed-hero h1 em{color:var(--amber);font-style:italic}
.feed-hero p{color:rgba(255,255,255,.45);font-size:.92rem;font-weight:300;max-width:560px;margin:0 auto}

/* STATS BAR */
.feed-stats{background:#fff;border-bottom:1px solid var(--stone);padding:.75rem 5vw;display:flex;gap:2.5rem;overflow-x:auto}
.feed-stat{display:flex;align-items:center;gap:.5rem;white-space:nowrap}
.feed-stat .num{font-family:var(--font-d);font-size:1.1rem;font-weight:700;color:var(--amber)}
.feed-stat .lbl{font-size:.8rem;color:var(--slate)}

/* TABS */
.tab-bar{max-width:1200px;margin:1.5rem auto 0;padding:0 5vw;display:flex;gap:.5rem;flex-wrap:wrap}
.tab-btn{padding:.55rem 1.2rem;border:1px solid var(--stone);background:#fff;border-radius:10px;font-family:var(--font-b);font-size:.85rem;font-weight:500;cursor:pointer;color:var(--slate);transition:all .2s;display:inline-flex;align-items:center;gap:.4rem}
.tab-btn:hover{border-color:var(--amber);color:var(--amber)}
.tab-btn.active{background:var(--navy);color:#fff;border-color:var(--navy)}
.tab-btn .badge{font-size:.7rem;background:rgba(245,166,35,.2);color:var(--amber-dk);padding:1px 6px;border-radius:8px;font-weight:600}
.tab-btn.active .badge{background:rgba(255,255,255,.15);color:rgba(255,255,255,.8)}

/* CONTENT AREA */
.feed-content{max-width:1200px;margin:1.5rem auto 3rem;padding:0 5vw}

/* ─── LAYOFF FEED ─── */
.feed-list{display:flex;flex-direction:column;gap:.75rem}
.feed-card{background:#fff;border:1px solid var(--stone);border-radius:14px;padding:1.3rem 1.5rem;transition:all .2s;cursor:default}
.feed-card:hover{border-color:var(--mist);box-shadow:0 4px 16px rgba(26,35,64,.06)}
.feed-card.severity-critical{border-left:4px solid var(--red)}
.feed-card.severity-high{border-left:4px solid var(--terra)}
.feed-card.severity-medium{border-left:4px solid var(--amber)}
.feed-card.severity-low{border-left:4px solid var(--mist)}
.fc-top{display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;margin-bottom:.5rem}
.fcard-title{font-family:var(--font-d);font-size:1.05rem;color:var(--navy);line-height:1.3;flex:1}
.fc-severity{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;padding:2px 8px;border-radius:10px;flex-shrink:0}
.fc-severity.critical{background:rgba(192,57,43,.1);color:var(--red)}
.fc-severity.high{background:rgba(200,95,62,.1);color:var(--terra)}
.fc-severity.medium{background:rgba(245,166,35,.12);color:var(--amber-dk)}
.fc-severity.low{background:rgba(139,168,181,.1);color:var(--mist)}
.fc-summary{font-size:.88rem;color:var(--slate);font-weight:300;line-height:1.6;margin-bottom:.75rem}
.fc-meta{display:flex;flex-wrap:wrap;gap:.5rem;align-items:center}
.fc-chip{font-size:.75rem;padding:2px 8px;border-radius:12px;background:var(--cream);border:1px solid var(--stone);color:var(--slate)}
.fc-chip.source{background:rgba(26,35,64,.05);color:var(--navy);font-weight:500}
.fc-chip.company{color:var(--terra);background:rgba(200,95,62,.06);border-color:rgba(200,95,62,.15)}
.fc-chip.count{color:var(--red);background:rgba(192,57,43,.06);border-color:rgba(192,57,43,.15);font-weight:600}
.fc-date{font-size:.75rem;color:#bbb;margin-left:auto}
.fc-link{font-size:.82rem;color:var(--amber-dk);text-decoration:none;font-weight:500;margin-left:auto}
.fc-link:hover{text-decoration:underline}

/* ─── AGENCY CARDS ─── */
.agency-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:1rem}
.agency-card{background:#fff;border:1px solid var(--stone);border-radius:14px;padding:1.5rem;transition:all .2s}
.agency-card:hover{border-color:var(--mist);box-shadow:0 4px 16px rgba(26,35,64,.06)}
.ag-type{font-size:.68rem;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--terra);margin-bottom:.5rem}
.ag-name{font-family:var(--font-d);font-size:1.05rem;color:var(--navy);margin-bottom:.3rem}
.ag-desc{font-size:.85rem;color:var(--slate);font-weight:300;line-height:1.55;margin-bottom:.75rem;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.ag-location{font-size:.82rem;color:var(--slate);margin-bottom:.6rem;display:flex;align-items:center;gap:.3rem}
.ag-services{display:flex;flex-wrap:wrap;gap:.3rem;margin-bottom:.75rem}
.ag-service{font-size:.7rem;padding:2px 7px;border-radius:10px;background:rgba(45,122,58,.06);color:var(--green);border:1px solid rgba(45,122,58,.15)}
.ag-populations{display:flex;flex-wrap:wrap;gap:.3rem;margin-bottom:.75rem}
.ag-pop{font-size:.7rem;padding:2px 7px;border-radius:10px;background:rgba(245,166,35,.08);color:var(--amber-dk);border:1px solid rgba(245,166,35,.2)}
.ag-link{display:inline-block;font-size:.85rem;color:var(--amber-dk);text-decoration:none;font-weight:600;transition:color .2s}
.ag-link:hover{color:var(--terra)}

/* ─── FILTER BAR ─── */
.filter-bar{display:flex;gap:.75rem;margin-bottom:1.5rem;flex-wrap:wrap;align-items:center}
.filter-bar select,.filter-bar input{padding:.5rem .85rem;border:1px solid var(--stone);border-radius:8px;font-family:var(--font-b);font-size:.85rem;color:var(--navy);background:#fff;outline:none}
.filter-bar select:focus,.filter-bar input:focus{border-color:var(--amber)}
.filter-label{font-size:.8rem;color:var(--slate);font-weight:500}

/* ─── TRAINING CARDS ─── */
.training-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1rem}
.training-card{background:#fff;border:1px solid var(--stone);border-radius:14px;padding:1.5rem;transition:all .2s;display:flex;flex-direction:column}
.training-card:hover{border-color:var(--mist);box-shadow:0 4px 16px rgba(26,35,64,.06)}
.training-card.featured{border-color:var(--amber);border-width:2px}
.tc-provider{font-size:.72rem;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--terra);margin-bottom:.4rem}
.tc-title{font-family:var(--font-d);font-size:1.05rem;color:var(--navy);margin-bottom:.35rem;line-height:1.3}
.tc-desc{font-size:.85rem;color:var(--slate);font-weight:300;line-height:1.55;flex:1;margin-bottom:.75rem;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.tc-chips{display:flex;flex-wrap:wrap;gap:.3rem;margin-bottom:.75rem}
.tc-chip{font-size:.72rem;padding:2px 8px;border-radius:10px}
.tc-chip.free{background:rgba(45,122,58,.08);color:var(--green);border:1px solid rgba(45,122,58,.2);font-weight:600}
.tc-chip.paid{background:rgba(200,95,62,.06);color:var(--terra);border:1px solid rgba(200,95,62,.15)}
.tc-chip.level{background:var(--cream);color:var(--slate);border:1px solid var(--stone)}
.tc-chip.type{background:rgba(26,35,64,.04);color:var(--navy);border:1px solid rgba(26,35,64,.1)}
.tc-link{display:inline-block;font-size:.85rem;color:var(--amber-dk);text-decoration:none;font-weight:600}
.tc-link:hover{color:var(--terra)}

@media(max-width:960px){
  .nav-links{display:none}
  .agency-grid,.training-grid{grid-template-columns:1fr}
}
@media(max-width:640px){
  .filter-bar{flex-direction:column;align-items:stretch}
  .tab-bar{gap:.35rem}
  .tab-btn{font-size:.8rem;padding:.45rem .85rem}
}
</style>
</head>

<!-- HERO -->
<div class="feed-hero">
  <h1>Career <em>Intelligence</em><br/>in Real Time</h1>
  <p>Layoff alerts, workforce agencies, and free training — curated and updated daily so you can stay ahead.</p>

<!-- STATS -->
<div class="feed-stats" id="feed-stats">

  <button class="tab-btn" onclick="switchTab('agencies')">🏛️ Agencies <span class="badge" id="tab-agency-count">—</span></button>
  <button class="tab-btn" onclick="switchTab('training')">📚 Training <span class="badge" id="tab-training-count">—</span></button>
</div>

<!-- CONTENT -->
<div class="feed-content" id="feed-content">
  <div style="padding:3rem;text-align:center;color:#bbb">Loading intelligence feed…</div>
</div>

<script>
// ─── STATE ─────────────────────────────────────────────
let currentTab = 'layoffs';
let feedItems = [];
let agencies = [];
let training = [];

// US states for filter dropdown
const US_STATES = {AL:'Alabama',AK:'Alaska',AZ:'Arizona',AR:'Arkansas',CA:'California',CO:'Colorado',CT:'Connecticut',DE:'Delaware',FL:'Florida',GA:'Georgia',HI:'Hawaii',ID:'Idaho',IL:'Illinois',IN:'Indiana',IA:'Iowa',KS:'Kansas',KY:'Kentucky',LA:'Louisiana',ME:'Maine',MD:'Maryland',MA:'Massachusetts',MI:'Michigan',MN:'Minnesota',MS:'Mississippi',MO:'Missouri',MT:'Montana',NE:'Nebraska',NV:'Nevada',NH:'New Hampshire',NJ:'New Jersey',NM:'New Mexico',NY:'New York',NC:'North Carolina',ND:'North Dakota',OH:'Ohio',OK:'Oklahoma',OR:'Oregon',PA:'Pennsylvania',RI:'Rhode Island',SC:'South Carolina',SD:'South Dakota',TN:'Tennessee',TX:'Texas',UT:'Utah',VT:'Vermont',VA:'Virginia',WA:'Washington',WV:'West Virginia',WI:'Wisconsin',WY:'Wyoming'};

// ─── INIT ──────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', async () => {
  await Promise.all([loadFeedItems(), loadAgencies(), loadTraining(), loadStats()]);
  renderTab();
});

// ─── LOAD DATA ─────────────────────────────────────────
async function loadStats() {
  try {
    const { data } = await db.from('feed_stats').select('*').single();
    if (data) {
      document.getElementById('stat-alerts').textContent = (+data.layoff_alerts).toLocaleString();
      document.getElementById('stat-agencies').textContent = (+data.active_agencies).toLocaleString();
      document.getElementById('stat-training').textContent = (+data.training_resources).toLocaleString();
      document.getElementById('stat-free').textContent = (+data.free_resources).toLocaleString();
    }
  } catch(e) {}
}

async function loadFeedItems() {
  const { data } = await db.from('feed_items')
    .select('*')
    .eq('is_published', true)
    .order('published_at', { ascending: false })
    .limit(100);
  feedItems = data || [];
  document.getElementById('tab-layoff-count').textContent = feedItems.length;
}

async function loadAgencies() {
  const { data } = await db.from('agencies')
    .select('*')
    .eq('is_active', true)
    .order('location_state')
    .order('name');
  agencies = data || [];
  document.getElementById('tab-agency-count').textContent = agencies.length;
}

async function loadTraining() {
  const { data } = await db.from('training_resources')
    .select('*')
    .order('is_featured', { ascending: false })
    .order('title');
  training = data || [];
  document.getElementById('tab-training-count').textContent = training.length;
}

// ─── TAB SWITCHING ─────────────────────────────────────
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach((btn, i) => {
    btn.classList.toggle('active', ['layoffs','agencies','training'][i] === tab);
  });
  renderTab();
}

function renderTab() {
  if (currentTab === 'layoffs') renderLayoffs();
  else if (currentTab === 'agencies') renderAgencies();
  else if (currentTab === 'training') renderTraining();
}

// ─── LAYOFFS TAB ───────────────────────────────────────
function renderLayoffs() {
  const content = document.getElementById('feed-content');

  if (feedItems.length === 0) {
    content.innerHTML = `
      <div class="empty-state" style="margin-top:2rem">
        <div class="icon">📡</div>
        <h3>No feed items yet</h3>
        <p>The intelligence feed runs daily. Once deployed, layoff alerts, hiring surges, and industry news will appear here automatically.</p>
      </div>`;
    return;
  }

  let html = `
    <div class="filter-bar">
      <span class="filter-label">Filter:</span>
      <select id="filter-type" onchange="renderLayoffs()">
        <option value="">All Types</option>
        <option value="layoff">Layoffs</option>
        <option value="hiring-surge">Hiring Surges</option>
        <option value="industry-news">Industry News</option>
      </select>
      <select id="filter-severity" onchange="renderLayoffs()">
        <option value="">All Severity</option>
        <option value="critical">Critical</option>
        <option value="high">High</option>
        <option value="medium">Medium</option>
      </select>
      <input type="text" id="filter-search" placeholder="Search company or keyword…" oninput="renderLayoffs()" style="flex:1;min-width:180px"/>
    </div>
    <div class="feed-list">`;

  const typeFilter = document.getElementById('filter-type')?.value || '';
  const sevFilter = document.getElementById('filter-severity')?.value || '';
  const searchFilter = (document.getElementById('filter-search')?.value || '').toLowerCase();

  const filtered = feedItems.filter(item => {
    if (typeFilter && item.item_type !== typeFilter) return false;
    if (sevFilter && item.severity !== sevFilter) return false;
    if (searchFilter && !(item.title + ' ' + (item.company_name || '') + ' ' + (item.summary || '')).toLowerCase().includes(searchFilter)) return false;
    return true;
  });

  if (filtered.length === 0) {
    html += `<div class="empty-state"><div class="icon">🔍</div><h3>No matching items</h3><p>Try adjusting your filters.</p></div>`;
  } else {
    filtered.forEach(item => {
      const daysAgo = Math.floor((Date.now() - new Date(item.published_at)) / 86400000);
      const dateLabel = daysAgo === 0 ? 'Today' : daysAgo === 1 ? 'Yesterday' : `${daysAgo}d ago`;
      const typeEmoji = {layoff:'🔴',['hiring-surge']:'🟢',['industry-news']:'📰',['policy-change']:'📋',opportunity:'💡'}[item.item_type] || '📌';

      html += `
        <div class="feed-card severity-${item.severity || 'medium'}">
          <div class="fc-top">
            <div class="fcard-title">${typeEmoji} ${item.title}</div>
            <span class="fc-severity ${item.severity || 'medium'}">${item.severity || 'medium'}</span>
          </div>
          ${item.summary ? `<div class="fc-summary">${item.summary}</div>` : ''}
          <div class="fc-meta">
            <span class="fc-chip source">${formatSource(item.source)}</span>
            ${item.company_name ? `<span class="fc-chip company">${item.company_name}</span>` : ''}
            ${item.affected_count ? `<span class="fc-chip count">${item.affected_count.toLocaleString()} affected</span>` : ''}
            ${item.location_state ? `<span class="fc-chip">📍 ${US_STATES[item.location_state] || item.location_state}</span>` : ''}
            ${item.source_url ? `<a class="fc-link" href="${item.source_url}" target="_blank">Read more →</a>` : ''}
            <span class="fc-date">${dateLabel}</span>
          </div>
        </div>`;
    });
  }

  html += `</div>`;
  content.innerHTML = html;
}

// ─── AGENCIES TAB ──────────────────────────────────────
function renderAgencies() {
  const content = document.getElementById('feed-content');

  let html = `
    <div class="filter-bar">
      <span class="filter-label">State:</span>
      <select id="agency-state" onchange="renderAgencies()">
        <option value="">All States</option>
        <option value="_national">National / Remote</option>
        ${Object.entries(US_STATES).map(([k,v]) => `<option value="${k}">${v}</option>`).join('')}
      </select>
      <select id="agency-type" onchange="renderAgencies()">
        <option value="">All Types</option>
        <option value="american-job-center">American Job Centers</option>
        <option value="state-workforce">State Workforce</option>
        <option value="veterans">Veterans</option>
        <option value="senior">50+ / Senior</option>
        <option value="youth">Youth</option>
        <option value="nonprofit">Nonprofit</option>
        <option value="reentry">Re-Entry</option>
      </select>
      <input type="text" id="agency-search" placeholder="Search agencies…" oninput="renderAgencies()" style="flex:1;min-width:180px"/>
    </div>
    <div class="agency-grid">`;

  const stateFilter = document.getElementById('agency-state')?.value || '';
  const typeFilter = document.getElementById('agency-type')?.value || '';
  const searchFilter = (document.getElementById('agency-search')?.value || '').toLowerCase();

  const filtered = agencies.filter(a => {
    if (stateFilter === '_national' && a.location_state) return false;
    if (stateFilter && stateFilter !== '_national' && a.location_state !== stateFilter) return false;
    if (typeFilter && a.agency_type !== typeFilter) return false;
    if (searchFilter && !(a.name + ' ' + (a.description || '')).toLowerCase().includes(searchFilter)) return false;
    return true;
  });

  const serviceLabels = {'job-placement':'Job Placement','resume-help':'Resume Help','career-counseling':'Career Counseling','training':'Training','unemployment-filing':'Unemployment','job-fairs':'Job Fairs','childcare-assistance':'Childcare Aid','apprenticeships':'Apprenticeships','mentoring':'Mentoring','internships':'Internships'};
  const popLabels = {veterans:'Veterans',seniors:'50+',youth:'Youth 18-29',disabled:'Disability',['formerly-incarcerated']:'Re-Entry',['english-learners']:'ESL'};

  if (filtered.length === 0) {
    html += `<div class="empty-state" style="grid-column:1/-1"><div class="icon">🏛️</div><h3>No agencies found</h3><p>Try a different state or type filter.</p></div>`;
  } else {
    filtered.forEach(a => {
      const typeLabel = (a.agency_type || '').replace(/-/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
      html += `
        <div class="agency-card">
          <div class="ag-type">${typeLabel}</div>
          <div class="ag-name">${a.name}</div>
          ${a.description ? `<div class="ag-desc">${a.description}</div>` : ''}
          <div class="ag-location">📍 ${a.location_city ? a.location_city + ', ' : ''}${a.location_state ? US_STATES[a.location_state] || a.location_state : 'Nationwide'}${a.serves_remote ? ' · 🌐 Virtual services' : ''}</div>
          ${a.services && a.services.length ? `<div class="ag-services">${a.services.map(s => `<span class="ag-service">${serviceLabels[s] || s}</span>`).join('')}</div>` : ''}
          ${a.populations && a.populations.length ? `<div class="ag-populations">${a.populations.map(p => `<span class="ag-pop">${popLabels[p] || p}</span>`).join('')}</div>` : ''}
          ${a.website ? `<a class="ag-link" href="${a.website}" target="_blank">Visit Website →</a>` : ''}
        </div>`;
    });
  }

  html += `</div>`;
  content.innerHTML = html;
}

// ─── TRAINING TAB ──────────────────────────────────────
function renderTraining() {
  const content = document.getElementById('feed-content');

  let html = `
    <div class="filter-bar">
      <span class="filter-label">Cost:</span>
      <select id="train-cost" onchange="renderTraining()">
        <option value="">All</option>
        <option value="free">Free Only</option>
        <option value="paid">Paid / Aid Available</option>
      </select>
      <select id="train-level" onchange="renderTraining()">
        <option value="">All Levels</option>
        <option value="beginner">Beginner</option>
        <option value="intermediate">Intermediate</option>
        <option value="advanced">Advanced</option>
      </select>
      <select id="train-type" onchange="renderTraining()">
        <option value="">All Types</option>
        <option value="certification">Certifications</option>
        <option value="course">Courses</option>
        <option value="guide">Guides</option>
        <option value="tutorial">Tutorials</option>
      </select>
      <input type="text" id="train-search" placeholder="Search training…" oninput="renderTraining()" style="flex:1;min-width:180px"/>
    </div>
    <div class="training-grid">`;

  const costFilter = document.getElementById('train-cost')?.value || '';
  const levelFilter = document.getElementById('train-level')?.value || '';
  const typeFilter = document.getElementById('train-type')?.value || '';
  const searchFilter = (document.getElementById('train-search')?.value || '').toLowerCase();

  const filtered = training.filter(t => {
    if (costFilter === 'free' && !t.is_free) return false;
    if (costFilter === 'paid' && t.is_free) return false;
    if (levelFilter && t.skill_level !== levelFilter) return false;
    if (typeFilter && t.content_type !== typeFilter) return false;
    if (searchFilter && !(t.title + ' ' + (t.description || '') + ' ' + (t.tags || []).join(' ')).toLowerCase().includes(searchFilter)) return false;
    return true;
  });

  if (filtered.length === 0) {
    html += `<div class="empty-state" style="grid-column:1/-1"><div class="icon">📚</div><h3>No matching resources</h3><p>Try adjusting your filters.</p></div>`;
  } else {
    filtered.forEach(t => {
      html += `
        <div class="training-card${t.is_featured ? ' featured' : ''}">
          <div class="tc-provider">${t.provider || t.source}</div>
          <div class="tc-title">${t.title}</div>
          ${t.description ? `<div class="tc-desc">${t.description}</div>` : ''}
          <div class="tc-chips">
            <span class="tc-chip ${t.is_free ? 'free' : 'paid'}">${t.is_free ? '✓ Free' : '$ Paid / Aid'}</span>
            <span class="tc-chip level">${(t.skill_level || 'all-levels').replace('-', ' ')}</span>
            <span class="tc-chip type">${(t.content_type || 'course').replace('-', ' ')}</span>
          </div>
          <a class="tc-link" href="${t.source_url}" target="_blank">Start Learning →</a>
        </div>`;
    });
  }

  html += `</div>`;
  content.innerHTML = html;
}

// ─── HELPERS ───────────────────────────────────────────
function formatSource(s) {
  const m = {'warn-act':'WARN Act','rss-techcrunch':'TechCrunch','rss-reuters':'Reuters','rss-bls':'Bureau of Labor Statistics','layoffs-fyi':'Layoffs.fyi','manual':'Staff'};
  return m[s] || s;
}
